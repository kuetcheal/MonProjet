<!DOCTYPE html>
<html>
<head>
  <title>Test Google Maps</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    h2 {
      padding: 20px;
      margin: 0;
    }

    #map {
      height: 500px;
      width: 100%;
    }
  </style>
</head>

<body>

<h2>Suivi véhicule</h2>
<div id="map"></div>

<script>
let map;
let userMarker;
let vehicleMarker;

// Position véhicule (simulation)
let vehiclePos = { lat: 43.6047, lng: 3.8796 };

// Initialisation carte
function initMap() {

  map = new google.maps.Map(document.getElementById("map"), {
    zoom: 13,
    center: vehiclePos,
  });

  // Marker véhicule
  vehicleMarker = new google.maps.Marker({
    position: vehiclePos,
    map: map,
    title: "Véhicule",
    icon: "http://maps.google.com/mapfiles/ms/icons/green-dot.png"
  });

  // Récupérer position utilisateur
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition((position) => {

      const userPos = {
        lat: position.coords.latitude,
        lng: position.coords.longitude
      };

      console.log("Ma position :", userPos);

      // Marker utilisateur
      userMarker = new google.maps.Marker({
        position: userPos,
        map: map,
        title: "Moi",
        icon: "http://maps.google.com/mapfiles/ms/icons/blue-dot.png"
      });

      // Centrer carte entre les deux
      map.setCenter(userPos);

    }, () => {
      alert("Autorise la géolocalisation !");
    });
  }

  // Lancer mouvement véhicule
  moveVehicle();
}


// Simulation mouvement véhicule
function moveVehicle() {
  setInterval(() => {
    vehiclePos.lat += 0.0005;
    vehiclePos.lng += 0.0002;

    vehicleMarker.setPosition(vehiclePos);

  }, 2000);
}
</script>

<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBDGz1y0BX_Ca_YJitOavFu-8_K188MBYQ&callback=initMap">
</script>

</body>
</html>
